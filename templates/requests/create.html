{% extends "base.html" %}

{% block title %}Create New Request - SQL 2FA{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/sql/sql.min.js"></script>
{% endblock %}

{% block content %}
<h1>Create New Request</h1>
<p>Employee Number: <strong>{{ session['operator_id'] }}</strong></p>

<form method="POST" style="max-width: 640px;">
    <div class="form-group">
        <label for="target_date">Date Requested for DML</label>
        <input type="date" id="target_date" name="target_date" required>
    </div>

    <div class="form-group">
        <label for="dml_statement">DML Statement</label>
        <textarea id="dml_statement" name="dml_statement" rows="6"
                  placeholder="Please input requested DML SQL here..." required></textarea>
    </div>

    <div class="form-group">
        <label for="request_reason">What are you trying to do with this DML?</label>
        <textarea id="request_reason" name="request_reason" rows="4"
                  placeholder="Provide a brief description of the business problem that requires this DML."></textarea>
    </div>

    <div class="form-group">
        <label for="request_potential_issues">What issues could arise (if any) from this DML?</label>
        <textarea id="request_potential_issues" name="request_potential_issues" rows="4"
                  placeholder="Input potential problems here..."></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-primary">Submit</button>
        <a href="{{ url_for('dashboard.home') }}"><button type="button">Cancel</button></a>
    </div>
</form>

<script>
var dmlTextarea = document.getElementById("dml_statement");
var editor = CodeMirror.fromTextArea(dmlTextarea, {
    mode: "text/x-sql",
    lineNumbers: true,
    matchBrackets: true,
    indentWithTabs: true,
    tabSize: 4
});
editor.setSize(null, 200);

// Keep the underlying textarea in sync so required validation works.
editor.on("change", function () {
    editor.save();
});
</script>
{% endblock %}
