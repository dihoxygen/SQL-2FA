{% extends "base.html" %}

{% block title %}Deny Request - SQL 2FA{% endblock %}

{% block content %}
<h1>Deny Request</h1>
<p><strong>Request ID:</strong> {{ request_id }}</p>

<form method="POST" style="max-width: 640px;">
    <div class="form-group">
        <label for="denial_code">Denial Reason</label>
        <select id="denial_code" name="denial_code" required>
            <option value="">Select Reason for Denial</option>
            <option value="ERR_SQL">Error in SQL</option>
            <option value="BIZ_DEF">Business problem not properly defined</option>
            <option value="AFFECT">SQL will affect an existing process</option>
            <option value="OTHER">Other</option>
        </select>
    </div>

    <div class="form-group">
        <label for="denier_notes">Denier Notes</label>
        <textarea id="denier_notes" name="denier_notes" rows="4"
                  placeholder="Explain why this request is being denied..."></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-danger">Deny Request</button>
        <a href="{{ url_for('approvals.detail', request_id=request_id) }}">
            <button type="button">Cancel</button>
        </a>
    </div>
</form>
{% endblock %}
