{% extends "base.html" %}

{% block title %}Manager DML - SQL 2FA{% endblock %}

{% block content %}
<h1>Manager DML</h1>
<p><strong>SQL ID:</strong> {{ req.request_id }}</p>
<p><strong>Status:</strong> {{ req.current_status }} &mdash; {{ req.request_created_on }}</p>

<form method="POST" style="max-width: 640px;">
    <div class="form-group">
        <label for="manager_sql">Manager DML SQL</label>
        <textarea id="manager_sql" name="manager_sql" rows="6"
                  placeholder="Please input requested DML SQL here..." required></textarea>
    </div>

    <div class="form-group">
        <label for="reason">Reason for executing this Manager DML</label>
        <textarea id="reason" name="reason" rows="4"
                  placeholder="Manager Notes..." required></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-primary"
                onclick="return confirm('Are you sure you want to execute this Manager DML?')">
            Execute SQL
        </button>
        <a href="{{ url_for('manager.manager_detail', request_id=req.request_id) }}">
            <button type="button">Cancel</button>
        </a>
    </div>
</form>
{% endblock %}
